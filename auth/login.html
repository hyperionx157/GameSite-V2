<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Dev Portal</title>
    <link rel="stylesheet" href="../assets/css/Main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="../config.js"></script>
    <script>
        // Wait for config.js to load Firebase config
        async function initializeFirebase() {
            // Wait a bit for config.js to fetch the config
            let attempts = 0;
            while (!window.FIREBASE_CONFIG || window.FIREBASE_CONFIG.apiKey === 'LOADING_CONFIG') {
                if (attempts > 50) {
                    console.error('Timeout waiting for Firebase config');
                    break;
                }
                await new Promise(resolve => setTimeout(resolve, 100));
                attempts++;
            }
            
            const firebaseConfig = window.FIREBASE_CONFIG || {
                apiKey: "MISSING_API_KEY_CONFIGURE_IN_CONFIG_JS",
                authDomain: "githubv2-1b9d0.firebaseapp.com",
                projectId: "githubv2-1b9d0",
                storageBucket: "githubv2-1b9d0.firebasestorage.app",
                messagingSenderId: "971057847754",
                appId: "1:971057847754:web:c3e42f649e3c6ed17b8333",
                measurementId: "G-3K434YVGSZ"
            };
            
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            window.db = firebase.firestore();
        }
        
        // Initialize Firebase when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initializeFirebase);
        } else {
            initializeFirebase();
        }
    </script>
    <script src="../scripts/auth.js"></script>
    <script src="../assets/js/settings.js" defer></script>
</head>
<body>

    <div id="loginHub" class="login-hub">
        <div class="login-container">
            <div class="login-header">
                <h1>Dev Portal</h1>
                <p>Sign in to continue</p>
            </div>
            <div id="loginForm" class="login-form">
                <div class="form-group">
                    <input type="text" id="emailInput" placeholder="Username" class="login-input">
                </div>
                <div class="form-group">
                    <input type="password" id="passwordInput" placeholder="Password" class="login-input">
                </div>
                <button id="loginBtn" class="login-btn">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
                <button id="checkStatusBtn" class="login-btn" style="background: rgba(155,89,182,0.2); margin-top: 10px;">
                    <i class="fas fa-sync-alt"></i> Check Approval Status
                </button>
                <div class="login-footer">
                    <p>Don't have an account? <a href="#" id="signupLink">Sign up</a></p>
                </div>
            </div>
            <div id="signupForm" class="signup-form" style="display:none;">
                <div class="form-group">
                    <input type="text" id="signupRealName" placeholder="Real name (e.g. John Smith)" class="login-input">
                </div>
                <div class="form-group">
                    <input type="text" id="signupName" placeholder="Display name / username" class="login-input">
                </div>
                <div class="form-group">
                    <input type="password" id="signupPassword" placeholder="Password (min 6 chars)" class="login-input">
                </div>
                <button id="signupBtn" class="login-btn">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
                <div class="login-footer">
                    <p>Already have an account? <a href="#" id="backToLogin">Sign in</a></p>
                </div>
            </div>
        </div>
    </div>

    <div id="loadingOverlay" class="loading-overlay" style="display:none;">
        <div class="loading-spinner">
            <i class="fas fa-spinner fa-spin"></i>
            <p>Loading...</p>
        </div>
    </div>

</body>
</html>
