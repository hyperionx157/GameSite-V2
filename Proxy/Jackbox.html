<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jackbox.tv Proxy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #ff6b35 0%, #f7931e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2em;
        }
        
        .proxy-btn {
            background: #ff6b35;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px;
            transition: transform 0.2s;
        }
        
        .proxy-btn:hover {
            transform: scale(1.05);
            background: #e55a2b;
        }
        
        .info {
            margin-top: 30px;
            color: #666;
            font-size: 14px;
        }
        
        .room-code {
            margin-top: 20px;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 5px;
            font-family: monospace;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Jackbox.tv Tunnel</h1>
        <p>Play Jackbox games through your secure tunnel</p>
        
        <button class="proxy-btn" onclick="openJackbox()">
            🚀 Open Jackbox.tv
        </button>
        
        <div class="info">
            🔒 Connected through your VPS tunnel<br>
            🎯 Port: 8443<br>
            💡 After opening, enter the room code from the host
        </div>
    </div>
    
    <script>
        // Your VPS Jackbox tunnel
        const JACKBOX_URL = 'http://130.12.33.108:8443';
        
        function openJackbox() {
            window.open(JACKBOX_URL, '_blank');
        }
    </script>
</body>
</html>
