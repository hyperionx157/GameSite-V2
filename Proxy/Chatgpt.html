<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatGPT Proxy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2em;
        }
        
        .proxy-btn {
            background: #10a37f;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px;
            transition: transform 0.2s;
        }
        
        .proxy-btn:hover {
            transform: scale(1.05);
            background: #0e8a6b;
        }
        
        .info {
            margin-top: 30px;
            color: #666;
            font-size: 14px;
        }
        
        .loading {
            display: none;
            margin-top: 20px;
            color: #10a37f;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 ChatGPT Proxy</h1>
        <p>Click below to access ChatGPT through your secure proxy</p>
        
        <button class="proxy-btn" onclick="openChatGPT()">
            🚀 Open ChatGPT
        </button>
        
        <div class="loading" id="loading">
            Opening ChatGPT through proxy...
        </div>
        
        <div class="info">
            🔒 Protected by your VPS proxy<br>
            🌐 Bypasses network blocks
        </div>
    </div>
    
    <script>
        // Your VPS proxy address
        const PROXY_URL = 'http://130.12.33.108:8080/proxy?url=';
        
        function openChatGPT() {
            const loading = document.getElementById('loading');
            loading.style.display = 'block';
            
            // Open ChatGPT through proxy in new tab
            window.open(PROXY_URL + encodeURIComponent('https://chat.openai.com'), '_blank');
            
            setTimeout(() => {
                loading.style.display = 'none';
            }, 2000);
        }
    </script>
</body>
</html>
