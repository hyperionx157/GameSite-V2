<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whitelist Manager — Dev Portal</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0a1a 50%, #2d1b2d 100%);
            min-height: 100vh;
            color: #e0e0e0;
            padding: 2rem;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        h1 {
            color: #9b59b6;
            font-size: 2rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 0.5rem;
        }

        #connectionStatus {
            text-align: center;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            background: rgba(155,89,182,0.1);
            border: 1px solid rgba(155,89,182,0.3);
            transition: all 0.3s ease;
        }
        #connectionStatus.connected { background:rgba(40,167,69,0.15); border-color:rgba(40,167,69,0.4); color:#28a745; }
        #connectionStatus.error     { background:rgba(220,53,69,0.15);  border-color:rgba(220,53,69,0.4);  color:#dc3545; }

        .card {
            background: rgba(26,26,46,0.95);
            border: 1px solid rgba(155,89,182,0.25);
            border-radius: 14px;
            padding: 1.5rem;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        .card h3 {
            color: #9b59b6;
            font-size: 1.1rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .admin-card { border-color: rgba(231,76,60,0.3); }
        .admin-card h3 { color: #e74c3c; }
        .chat-card  { border-color: rgba(52,152,219,0.3); }
        .chat-card h3 { color: #3498db; }
        .debug-card { border-color: rgba(255,255,255,0.1); }
        .debug-card h3 { color: #888; }

        .live-dot {
            display: inline-block;
            width: 8px; height: 8px;
            background: #28a745;
            border-radius: 50%;
            margin-left: 6px;
            animation: livePulse 1.5s ease-in-out infinite;
            vertical-align: middle;
        }
        @keyframes livePulse {
            0%,100% { opacity:1; transform:scale(1); box-shadow:0 0 0 0 rgba(40,167,69,0.4); }
            50%      { opacity:0.8; transform:scale(1.2); box-shadow:0 0 0 4px rgba(40,167,69,0); }
        }

        .user-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 0.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            gap: 0.75rem;
        }
        .user-row:last-child { border-bottom: none; }

        .user-avatar {
            width: 38px; height: 38px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.85rem;
            color: #fff;
            flex-shrink: 0;
        }

        .user-info-block { flex: 1; min-width: 0; }
        .user-name  { font-weight: 600; font-size: 0.95rem; color: #e0e0e0; }
        .user-sub   { font-size: 0.78rem; color: #888; margin-top: 2px; }
        .user-real  { font-size: 0.8rem; color: #aaa; font-style: italic; }

        .status-dot {
            display: inline-block;
            width: 8px; height: 8px;
            border-radius: 50%;
            margin-right: 5px;
            vertical-align: middle;
        }
        .status-online { background: #28a745; box-shadow: 0 0 6px rgba(40,167,69,0.6); }
        .status-idle   { background: #ffc107; }

        .empty-row { color: #666; font-size: 0.9rem; padding: 0.75rem 0.5rem; }

        .btn {
            padding: 0.45rem 0.9rem;
            border-radius: 7px;
            border: none;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }
        .btn:hover { transform: translateY(-1px); filter: brightness(1.15); }
        .btn-success  { background: linear-gradient(135deg,#28a745,#20c997); color:#fff; }
        .btn-danger   { background: linear-gradient(135deg,#dc3545,#c82333); color:#fff; }
        .btn-secondary{ background: rgba(155,89,182,0.2); border:1px solid rgba(155,89,182,0.4); color:#9b59b6; }
        .btn-kick     { background: linear-gradient(135deg,#e67e22,#d35400); color:#fff; }
        .btn-blue     { background: linear-gradient(135deg,#3498db,#2980b9); color:#fff; }

        .action-pair { display: flex; gap: 0.4rem; flex-shrink: 0; }

        .add-row {
            display: flex;
            gap: 0.75rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }
        .add-row input {
            flex: 1;
            min-width: 160px;
            background: rgba(42,42,74,0.8);
            border: 1.5px solid rgba(155,89,182,0.35);
            border-radius: 8px;
            padding: 0.55rem 0.9rem;
            color: #e0e0e0;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .add-row input:focus { border-color: #9b59b6; }

        .btn-row {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            margin-top: 0.75rem;
        }

        .chat-log {
            max-height: 320px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            padding: 0.5rem 0;
        }
        .chat-log-msg {
            background: rgba(42,42,74,0.7);
            border-radius: 8px;
            padding: 0.55rem 0.75rem;
            display: flex;
            gap: 0.6rem;
            align-items: flex-start;
        }
        .chat-log-avatar {
            width: 28px; height: 28px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.7rem; font-weight: 700; color: #fff;
            flex-shrink: 0;
        }
        .chat-log-body { flex: 1; min-width: 0; }
        .chat-log-author { font-size: 0.78rem; font-weight: 700; color: #9b59b6; }
        .chat-log-real   { font-size: 0.72rem; color: #888; font-style: italic; margin-left: 4px; }
        .chat-log-text   { font-size: 0.88rem; color: #ddd; margin-top: 2px; word-break: break-word; }
        .chat-log-ts     { font-size: 0.7rem; color: #666; margin-top: 2px; }
        .chat-admin-input { display: flex; gap: 0.6rem; margin-top: 1rem; }
        .chat-admin-input input {
            flex: 1;
            background: rgba(42,42,74,0.8);
            border: 1.5px solid rgba(52,152,219,0.4);
            border-radius: 8px;
            padding: 0.55rem 0.9rem;
            color: #e0e0e0;
            font-size: 0.9rem;
            outline: none;
        }
        .chat-admin-input input:focus { border-color: #3498db; }

        .count-badge {
            background: rgba(155,89,182,0.3);
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 0.75rem;
            font-weight: 700;
            color: #9b59b6;
            margin-left: auto;
        }
        .count-badge.blue { background:rgba(52,152,219,0.25); color:#3498db; }

        #toast {
            position: fixed;
            bottom: 24px; right: 24px;
            padding: 0.85rem 1.4rem;
            border-radius: 10px;
            color: #fff;
            font-weight: 600;
            font-size: 0.9rem;
            z-index: 9999;
            display: none;
            max-width: 300px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            transition: opacity 0.3s ease;
        }

        #debugOutput {
            font-family: monospace;
            font-size: 0.78rem;
            color: #aaa;
            margin-top: 0.75rem;
            min-height: 1.2rem;
        }
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="../config.js?v=2"></script>
    <script src="../scripts/admin-guard.js?v=4"></script>
    <script src="../scripts/secure-storage.js?v=2"></script>
    
    <!-- Additional Security Measures -->
    <script>
        // Immediate security check - runs before everything else
        (function() {
            'use strict';
            
            // Block access if not on HTTPS (in production) - allow localhost and local development
            if (location.protocol === 'http:' && 
                location.hostname !== 'localhost' && 
                location.hostname !== '127.0.0.1' &&
                !location.hostname.startsWith('192.168.') &&
                !location.hostname.startsWith('10.') &&
                !location.hostname.endsWith('.local')) {
                location.replace(`https:${location.href.substring(location.protocol.length)}`);
                return;
            }
            
            // Clear any sensitive data from session storage
            sessionStorage.removeItem('adminAccess');
            sessionStorage.removeItem('tempAdminToken');
            
            // Add page visibility monitoring
            document.addEventListener('visibilitychange', function() {
                if (document.hidden) {
                    // Page is hidden - log for security monitoring
                    console.log('Security: Whitelist manager page hidden');
                }
            });
            
            // Prevent right-click context menu
            document.addEventListener('contextmenu', function(e) {
                e.preventDefault();
                return false;
            });
            
            // Block common developer shortcuts
            document.addEventListener('keydown', function(e) {
                // Block F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U
                if (e.keyCode === 123 || 
                    (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) ||
                    (e.ctrlKey && e.keyCode === 85)) {
                    e.preventDefault();
                    return false;
                }
            });
            
            // Monitor for console access attempts
            let consoleOpened = false;
            const checkConsole = setInterval(function() {
                if (window.console && window.console.clear && !consoleOpened) {
                    consoleOpened = true;
                    console.clear();
                    console.log('%c ACCESS DENIED', 'color: red; font-size: 50px; font-weight: bold;');
                    console.log('%c This area is restricted to administrators only.', 'color: red; font-size: 20px;');
                }
            }, 1000);
            
            // Cleanup after 10 seconds
            setTimeout(() => clearInterval(checkConsole), 10000);
        })();
    </script>
</head>
<body>

<div class="container">
    <div>
        <h1>⚙️ Whitelist Manager</h1>
        <div id="connectionStatus">Connecting to Firebase...</div>
    </div>

    <!-- Approved Users -->
    <div class="card">
        <h3>✅ Approved Users <span id="approvedCount" class="count-badge">0</span></h3>
        <div id="approvedList"><div class="empty-row">Loading...</div></div>
        <div class="add-row">
            <input type="text" id="newUsername" placeholder="Add username to whitelist...">
            <button class="btn btn-success" id="addUserBtn">+ Add</button>
        </div>
    </div>

    <!-- Pending Requests -->
    <div class="card">
        <h3>🕐 Pending Requests <span id="pendingCount" class="count-badge">0</span></h3>
        <div id="pendingList"><div class="empty-row">Loading...</div></div>
        <div class="btn-row">
            <button class="btn btn-danger" id="clearAllPendingBtn">🗑 Clear All Pending</button>
        </div>
    </div>

    <!-- Live Users -->
    <div class="card admin-card">
        <h3>
            🔴 Live Users
            <span class="live-dot" title="Auto-refreshing"></span>
            <span id="liveCount" class="count-badge" style="margin-left:0;">0 online</span>
        </h3>
        <div id="liveList"><div class="empty-row">No users currently online.</div></div>
        <div class="btn-row">
            <button class="btn btn-danger" id="kickAllUsersBtn">⚡ Kick All</button>
        </div>
    </div>

    <!-- Chat Monitor -->
    <div class="card chat-card">
        <h3>💬 Live Chat <span class="live-dot" title="Auto-refreshing"></span> <span id="chatCount" class="count-badge blue">0 messages</span></h3>
        <div id="chatLog" class="chat-log"><div class="empty-row">No messages yet.</div></div>
        <div class="chat-admin-input">
            <input type="text" id="adminChatInput" placeholder="Send message as Admin..." maxlength="300">
            <button class="btn btn-blue" id="sendAdminMsgBtn">Send</button>
        </div>
        <div class="btn-row">
            <button class="btn btn-danger" id="clearAllChatBtn">🗑 Clear All Chat</button>
        </div>
    </div>

    <!-- Content Suggestions -->
    <div class="card">
        <h3>💡 Content Suggestions <span class="live-dot" title="Auto-refreshing"></span> <span id="suggestionsCount" class="count-badge">0 suggestions</span></h3>
        <div id="suggestionsList"><div class="empty-row">No suggestions yet.</div></div>
        <div class="btn-row">
            <button class="btn btn-danger" id="clearAllSuggestionsBtn">🗑 Clear All Suggestions</button>
        </div>
    </div>

    <!-- Debug Tools -->
    <div class="card debug-card">
        <h3>🛠 Debug Tools</h3>
        <div class="btn-row">
            <button class="btn btn-secondary" id="createTestRequestBtn">Create Test Request</button>
            <button class="btn btn-secondary" id="refreshBtn">Refresh All</button>
        </div>
        <div id="debugOutput"></div>
    </div>
</div>

<div id="toast"></div>

<script>
// ─── Firebase (waits for real config from Cloudflare Worker) ─────────────────
var db;
async function initWhitelistFirebase() {
    var attempts = 0;
    while (!window.FIREBASE_CONFIG || window.FIREBASE_CONFIG.apiKey === 'LOADING_CONFIG' || window.FIREBASE_CONFIG.apiKey === 'MISSING_API_KEY_CONFIGURE_IN_CONFIG_JS') {
        if (attempts > 50) break;
        await new Promise(function(r){ setTimeout(r, 100); });
        attempts++;
    }
    var cfg = window.FIREBASE_CONFIG || {
        apiKey: "MISSING_API_KEY_CONFIGURE_IN_CONFIG_JS",
        authDomain: "githubv2-1b9d0.firebaseapp.com",
        projectId: "githubv2-1b9d0",
        storageBucket: "githubv2-1b9d0.firebasestorage.app",
        messagingSenderId: "971057847754",
        appId: "1:971057847754:web:c3e42f649e3c6ed17b8333",
        measurementId: "G-3K434YVGSZ"
    };
    if (!firebase.apps.length) firebase.initializeApp(cfg);
    db = firebase.firestore();
    window.db = db;
    console.log('[Whitelist] Firebase initialized with config');
}

// ─── State ────────────────────────────────────────────────────────────────────
let approvedUsers = [];
let pendingRequests = [];
let liveUsers = [];

// ─── Helper Functions ─────────────────────────────────────────────────────────
function getInitials(name) {
    if (!name) return '?';
    return name.trim().split(/\s+/).map(w => w[0]).join('').toUpperCase().slice(0, 2);
}

function avatarColor(name) {
    const colors = ['#9b59b6','#8e44ad','#3498db','#2ecc71','#e67e22','#e74c3c','#1abc9c','#f39c12'];
    let i = 0;
    for (let c = 0; c < (name||'').length; c++) i += name.charCodeAt(c);
    return colors[i % colors.length];
}

function timeAgo(date) {
    const diff = Math.floor((new Date() - date) / 1000);
    if (diff < 60) return 'Just now';
    if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
    return Math.floor(diff / 3600) + 'h ago';
}

function escHtml(str) {
    if (!str) return '';
    return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toast(msg, type) {
    const el = document.getElementById('toast');
    const bg = {
        success: 'linear-gradient(135deg,#28a745,#20c997)',
        error:   'linear-gradient(135deg,#dc3545,#c82333)',
        info:    'linear-gradient(135deg,#9b59b6,#8e44ad)'
    };
    el.style.background = bg[type] || bg.info;
    el.style.color   = '#fff';
    el.textContent   = msg;
    el.style.display = 'block';
    el.style.opacity = '1';
    clearTimeout(el._t);
    el._t = setTimeout(() => {
        el.style.opacity = '0';
        setTimeout(() => { el.style.display = 'none'; }, 300);
    }, 4000);
}

function debug(msg) {
    const el = document.getElementById('debugOutput');
    if (el) el.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
    console.log('[debug]', msg);
}

function setStatus(msg, cls) {
    const el = document.getElementById('connectionStatus');
    el.textContent = msg;
    el.className = cls || '';
}

// ═══════════════════════════════════════════════════════════════════════════════
// REAL-TIME LISTENERS (started after Firebase init)
// ═══════════════════════════════════════════════════════════════════════════════
function startListeners() {

// Approved Users - from users collection where allowed = true
db.collection('users').where('allowed', '==', true).onSnapshot(snap => {
    approvedUsers = [];
    snap.forEach(doc => {
        const data = doc.data();
        approvedUsers.push({
            id: doc.id,
            username: doc.id,
            displayName: data.displayName || doc.id,
            realName: data.realName || '',
            email: data.email || '',
            isAdmin: data.isAdmin || false
        });
    });
    renderApproved();
    setStatus('Connected · ' + approvedUsers.length + ' approved users · Live updates active', 'connected');
}, err => setStatus('Listener error: ' + err.message, 'error'));

// Pending requests
db.collection('pendingRequests').onSnapshot(snap => {
    pendingRequests = [];
    snap.forEach(doc => {
        const d = doc.data();
        pendingRequests.push({
            id: doc.id,
            username: d.username || doc.id,
            displayName: d.displayName || doc.id,
            realName: d.realName || '',
            requestedAt: d.requestedAt
        });
    });
    renderPending();
}, err => console.error('Pending listener:', err));

// Live users
db.collection('liveUsers').onSnapshot(snap => {
    const now = new Date();
    liveUsers = [];
    snap.forEach(doc => {
        const d = doc.data();
        const lastSeen = d.lastSeen ? d.lastSeen.toDate() : now;
        const diff = (now - lastSeen) / 1000;
        if (diff > 300) return;
        liveUsers.push({
            id: doc.id,
            username: d.username || 'unknown',
            displayName: d.displayName || d.username || 'Unknown',
            realName: d.realName || '',
            activity: d.activity || 'Browsing',
            lastSeen,
            status: diff > 60 ? 'idle' : 'online'
        });
    });
    renderLive();
}, err => console.error('Live users listener:', err));

// Chat
db.collection('chatMessages')
    .orderBy('timestamp', 'asc')
    .limitToLast(80)
    .onSnapshot(snap => {
        const log = document.getElementById('chatLog');
        const countEl = document.getElementById('chatCount');
        if (countEl) countEl.textContent = snap.size + ' messages';
        if (!snap.size) { log.innerHTML = '<div class="empty-row">No messages yet.</div>'; return; }

        log.innerHTML = '';
        snap.forEach(doc => {
            const m = doc.data();
            const name = m.displayName || m.author || m.username || 'User';
            const color = avatarColor(name);
            const ts = m.timestamp ? timeAgo(m.timestamp.toDate ? m.timestamp.toDate() : new Date(m.timestamp)) : '';

            const el = document.createElement('div');
            el.className = 'chat-log-msg';
            el.innerHTML =
                '<div class="chat-log-avatar" style="background:' + color + ';">' + getInitials(name) + '</div>' +
                '<div class="chat-log-body">' +
                    '<div><span class="chat-log-author">' + escHtml(name) + '</span></div>' +
                    '<div class="chat-log-text">' + escHtml(m.text) + '</div>' +
                    '<div class="chat-log-ts">' + ts + '</div>' +
                '</div>' +
                '<button class="btn btn-danger" style="font-size:0.72rem;padding:0.3rem 0.6rem;" data-msg-id="' + doc.id + '">✕</button>';
            log.appendChild(el);
        });
        log.scrollTop = log.scrollHeight;
    }, err => console.error('Chat listener:', err));

// Content Suggestions
db.collection('contentSuggestions')
    .orderBy('createdAt', 'desc')
    .limitToLast(50)
    .onSnapshot(snap => {
        const listEl = document.getElementById('suggestionsList');
        const countEl = document.getElementById('suggestionsCount');
        if (countEl) countEl.textContent = snap.size + ' suggestions';
        if (!snap.size) { 
            listEl.innerHTML = '<div class="empty-row">No suggestions yet.</div>'; 
            return; 
        }

        listEl.innerHTML = '';
        snap.forEach(doc => {
            const s = doc.data();
            const name = s.author || 'Anonymous';
            const color = avatarColor(name);
            const ts = s.createdAt ? timeAgo(s.createdAt.toDate ? s.createdAt.toDate() : new Date(s.createdAt)) : '';
            const votes = s.votes || 0;
            
            const el = document.createElement('div');
            el.className = 'user-row';
            el.innerHTML =
                '<div class="user-avatar" style="background:' + color + ';">' + getInitials(name) + '</div>' +
                '<div class="user-info-block">' +
                    '<div class="user-name">' + escHtml(s.title || 'No title') + '</div>' +
                    '<div class="user-sub">by ' + escHtml(name) + ' · ' + votes + ' votes · ' + ts + '</div>' +
                    (s.description ? '<div class="user-real">' + escHtml(s.description.substring(0, 100)) + (s.description.length > 100 ? '...' : '') + '</div>' : '') +
                '</div>' +
                '<div class="action-pair">' +
                    '<button class="btn btn-danger" data-suggestion-id="' + doc.id + '">✕ Delete</button>' +
                '</div>';
            listEl.appendChild(el);
        });
    }, err => console.error('Suggestions listener:', err));

} // end startListeners

// ═══════════════════════════════════════════════════════════════════════════════
// RENDER FUNCTIONS
// ═══════════════════════════════════════════════════════════════════════════════

function renderApproved() {
    const el = document.getElementById('approvedList');
    const countEl = document.getElementById('approvedCount');
    if (countEl) countEl.textContent = approvedUsers.length;

    if (!approvedUsers.length) {
        el.innerHTML = '<div class="empty-row">No approved users.</div>';
        return;
    }
    el.innerHTML = approvedUsers.map(u => {
        const color = avatarColor(u.displayName);
        const initials = getInitials(u.displayName);
        return '<div class="user-row" data-username="' + u.username + '">' +
            '<div class="user-avatar" style="background:' + color + ';">' + initials + '</div>' +
            '<div class="user-info-block">' +
                '<div class="user-name">' + escHtml(u.displayName) + (u.isAdmin ? ' 👑' : '') + '</div>' +
                (u.realName ? '<div class="user-real">' + escHtml(u.realName) + '</div>' : '') +
                '<div class="user-sub">@' + escHtml(u.username) + '</div>' +
            '</div>' +
            '<button class="btn btn-danger remove-user-btn" data-username="' + u.username + '">Remove</button>' +
        '</div>';
    }).join('');
}

function renderPending() {
    const el = document.getElementById('pendingList');
    const countEl = document.getElementById('pendingCount');
    if (countEl) countEl.textContent = pendingRequests.length;

    if (!pendingRequests.length) {
        el.innerHTML = '<div class="empty-row">No pending requests.</div>';
        return;
    }
    el.innerHTML = pendingRequests.map(r => {
        const color = avatarColor(r.displayName);
        const initials = getInitials(r.displayName);
        const dateStr = r.requestedAt ? new Date(r.requestedAt.toDate()).toLocaleString() : '';
        return '<div class="user-row" data-username="' + r.username + '">' +
            '<div class="user-avatar" style="background:' + color + ';">' + initials + '</div>' +
            '<div class="user-info-block">' +
                '<div class="user-name">' + escHtml(r.displayName) + '</div>' +
                (r.realName ? '<div class="user-real">' + escHtml(r.realName) + '</div>' : '') +
                '<div class="user-sub">@' + escHtml(r.username) + (dateStr ? ' · ' + dateStr : '') + '</div>' +
            '</div>' +
            '<div class="action-pair">' +
                '<button class="btn btn-success approve-user-btn" data-username="' + r.username + '">✓ Approve</button>' +
                '<button class="btn btn-danger deny-user-btn" data-username="' + r.username + '">✗ Deny</button>' +
            '</div>' +
        '</div>';
    }).join('');
}

function renderLive() {
    const el = document.getElementById('liveList');
    const countEl = document.getElementById('liveCount');
    if (countEl) countEl.textContent = liveUsers.length + ' online';

    if (!liveUsers.length) {
        el.innerHTML = '<div class="empty-row">No users currently online.</div>';
        return;
    }
    liveUsers.sort((a, b) => b.lastSeen - a.lastSeen);
    el.innerHTML = liveUsers.map(u => {
        const color = avatarColor(u.displayName);
        const initials = getInitials(u.displayName);
        const statusCls = u.status === 'online' ? 'status-online' : 'status-idle';
        return '<div class="user-row" data-session-id="' + u.id + '">' +
            '<div class="user-avatar" style="background:' + color + ';">' + initials + '</div>' +
            '<div class="user-info-block">' +
                '<div class="user-name">' +
                    '<span class="status-dot ' + statusCls + '"></span>' +
                    escHtml(u.displayName) +
                '</div>' +
                (u.realName ? '<div class="user-real">' + escHtml(u.realName) + '</div>' : '') +
                '<div class="user-sub">@' + escHtml(u.username) + ' · ' + u.activity + ' · ' + timeAgo(u.lastSeen) + '</div>' +
            '</div>' +
            '<button class="btn btn-kick kick-user-btn" data-session-id="' + u.id + '" data-username="' + u.username + '">Kick</button>' +
        '</div>';
    }).join('');
}

// ═══════════════════════════════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════════════════════════════

async function addUser() {
    const input = document.getElementById('newUsername');
    const username = input.value.trim();
    if (!username) { toast('Please enter a username.', 'error'); return; }
    
    try {
        const existing = await db.collection('users').doc(username).get();
        if (existing.exists) {
            toast('User already exists.', 'error');
            return;
        }
        
        await db.collection('users').doc(username).set({
            username: username,
            displayName: username,
            allowed: true,
            addedBy: firebase.auth().currentUser?.email || 'admin',
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        
        await db.collection('pendingRequests').doc(username).delete();
        
        input.value = '';
        toast(username + ' added to whitelist.', 'success');
    } catch(e) {
        console.error('Error adding user:', e);
        toast('Error adding user.', 'error');
    }
}

// Approve user from pending - sends PRIVATE NOTIFICATION (not public chat)
async function approveUser(username) {
    try {
        console.log('✅ Starting approval for:', username);
        
        const pendingDoc = await db.collection('pendingRequests').doc(username).get();
        if (!pendingDoc.exists) {
            toast('No pending request found.', 'error');
            return;
        }
        
        const data = pendingDoc.data();
        console.log('📋 Pending data:', data);
        
        await db.collection('users').doc(username).set({
            username: username,
            displayName: data.displayName || username,
            realName: data.realName || '',
            email: data.email || `${username}@gamehub.local`,
            uid: data.uid,
            allowed: true,
            approvedAt: firebase.firestore.FieldValue.serverTimestamp(),
            approvedBy: firebase.auth().currentUser?.email || 'admin'
        });
        
        console.log('✅ Added to users collection');
        
        await db.collection('pendingRequests').doc(username).delete();
        console.log('✅ Deleted pending request');
        
        // Create private notification (NO public chat message)
        await db.collection('notifications').add({
            username: username,
            type: 'approval',
            title: '🎉 Account Approved!',
            message: `Your account has been approved by ${firebase.auth().currentUser?.displayName || 'an administrator'}. You can now log in!`,
            read: false,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        console.log('✅ Created private notification for user');
        
        toast(username + ' approved! They will receive a notification.', 'success');
        
        renderApproved();
        renderPending();
        
    } catch(e) {
        console.error('Error approving user:', e);
        toast('Error approving user: ' + e.message, 'error');
    }
}

async function denyUser(username) {
    if (!confirm('Deny request from ' + username + '?')) return;
    try {
        await db.collection('pendingRequests').doc(username).delete();
        toast(username + ' denied.', 'error');
    } catch(e) {
        console.error('Error denying user:', e);
        toast('Error denying user.', 'error');
    }
}

async function removeUser(username) {
    if (!confirm('Remove ' + username + ' from the whitelist?')) return;
    try {
        await db.collection('users').doc(username).delete();
        toast(username + ' removed from whitelist.', 'success');
    } catch(e) {
        console.error('Error removing user:', e);
        toast('Error removing user.', 'error');
    }
}

async function kickUser(sessionId, username) {
    if (!confirm('Kick ' + username + '?')) return;
    try {
        await db.collection('kickSignals').doc(sessionId).set({
            kicked: true,
            kickedBy: 'Admin',
            reason: 'Manual kick by admin',
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        await db.collection('liveUsers').doc(sessionId).delete();
        toast(username + ' has been kicked.', 'success');
        setTimeout(() => db.collection('kickSignals').doc(sessionId).delete().catch(()=>{}), 30000);
    } catch(e) {
        console.error('Error kicking user:', e);
        toast('Error kicking user.', 'error');
    }
}

async function kickAllUsers() {
    if (!confirm('Kick ALL ' + liveUsers.length + ' users?')) return;
    const batch = db.batch();
    const kBatch = db.batch();
    liveUsers.forEach(u => {
        kBatch.set(db.collection('kickSignals').doc(u.id), {
            kicked: true, kickedBy: 'Admin', reason: 'Mass kick',
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        batch.delete(db.collection('liveUsers').doc(u.id));
    });
    await Promise.all([batch.commit(), kBatch.commit()]);
    toast('All users kicked.', 'success');
}

async function sendAdminMessage() {
    const input = document.getElementById('adminChatInput');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    await db.collection('chatMessages').add({
        text,
        uid: 'admin',
        username: 'admin',
        author: '🛡️ Admin',
        displayName: '🛡️ Admin',
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
    });
    toast('Message sent.', 'success');
}

async function deleteChatMsg(id) {
    await db.collection('chatMessages').doc(id).delete();
    toast('Message deleted.', 'success');
}

async function clearAllChat() {
    if (!confirm('Delete ALL chat messages?')) return;
    const snap = await db.collection('chatMessages').get();
    const batch = db.batch();
    snap.forEach(doc => batch.delete(doc.ref));
    await batch.commit();
    toast('Chat cleared.', 'success');
}

async function deleteSuggestion(id) {
    if (!confirm('Delete this suggestion?')) return;
    await db.collection('contentSuggestions').doc(id).delete();
    toast('Suggestion deleted.', 'success');
}

async function clearAllSuggestions() {
    if (!confirm('Delete ALL content suggestions?')) return;
    const snap = await db.collection('contentSuggestions').get();
    const batch = db.batch();
    snap.forEach(doc => batch.delete(doc.ref));
    await batch.commit();
    toast('All suggestions cleared.', 'success');
}

async function clearAllPending() {
    if (!confirm('Clear ALL pending requests?')) return;
    const snap = await db.collection('pendingRequests').get();
    const batch = db.batch();
    snap.forEach(doc => batch.delete(doc.ref));
    await batch.commit();
    toast('All pending requests cleared.', 'success');
}

async function createTestRequest() {
    const id = 'testuser_' + Date.now();
    await db.collection('pendingRequests').doc(id).set({
        username: id,
        displayName: 'Test User',
        realName: 'Test Person',
        requestedAt: firebase.firestore.FieldValue.serverTimestamp(),
        status: 'pending'
    });
    debug('Created test request: ' + id);
    toast('Test request created.', 'success');
}

function refreshAll() {
    debug('Refreshing...');
    renderApproved();
    renderPending();
    renderLive();
    debug('Done.');
}

// ═══════════════════════════════════════════════════════════════════════════════
// EVENT LISTENERS
// ═══════════════════════════════════════════════════════════════════════════════

document.addEventListener('DOMContentLoaded', async () => {
    await initWhitelistFirebase();
    startListeners();
    document.getElementById('addUserBtn')?.addEventListener('click', addUser);
    document.getElementById('clearAllPendingBtn')?.addEventListener('click', clearAllPending);
    document.getElementById('kickAllUsersBtn')?.addEventListener('click', kickAllUsers);
    document.getElementById('sendAdminMsgBtn')?.addEventListener('click', sendAdminMessage);
    document.getElementById('clearAllChatBtn')?.addEventListener('click', clearAllChat);
    document.getElementById('clearAllSuggestionsBtn')?.addEventListener('click', clearAllSuggestions);
    document.getElementById('createTestRequestBtn')?.addEventListener('click', createTestRequest);
    document.getElementById('refreshBtn')?.addEventListener('click', refreshAll);
    
    document.body.addEventListener('click', (e) => {
        if (e.target.classList.contains('approve-user-btn')) {
            const username = e.target.getAttribute('data-username');
            approveUser(username);
        }
        else if (e.target.classList.contains('deny-user-btn')) {
            const username = e.target.getAttribute('data-username');
            denyUser(username);
        }
        else if (e.target.classList.contains('remove-user-btn')) {
            const username = e.target.getAttribute('data-username');
            removeUser(username);
        }
        else if (e.target.classList.contains('kick-user-btn')) {
            const sessionId = e.target.getAttribute('data-session-id');
            const username = e.target.getAttribute('data-username');
            kickUser(sessionId, username);
        }
        else if (e.target.getAttribute('data-msg-id')) {
            deleteChatMsg(e.target.getAttribute('data-msg-id'));
        }
        else if (e.target.getAttribute('data-suggestion-id')) {
            deleteSuggestion(e.target.getAttribute('data-suggestion-id'));
        }
    });
    
    setStatus('Connected to Firebase ✓ · Live updates active', 'connected');
});
</script>
